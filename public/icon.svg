<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="100" fill="#0f172a"/>
  <!-- Elegant letters "DE" with colors of the German flag as custom typography -->
  <g transform="translate(60, 110)">
    <!-- Letter G in black & golden accents -->
    <path d="M 180,120 A 100,100 0 1,0 180,220 L 180,170 L 130,170 L 130,130 L 220,130 L 220,250 A 140,140 0 1,1 220,90 Z" fill="#ffffff" />
    <path d="M 180,120 A 100,100 0 0,0 60,170" stroke="#FFCC00" stroke-width="15" fill="none" stroke-linecap="round"/>
    <path d="M 60,170 A 100,100 0 0,0 180,220" stroke="#D51F26" stroke-width="15" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Tiny Brandenburg gate silhouette inside -->
  <g transform="translate(196, 210) scale(1.1)" fill="#FFCC00">
    <rect x="5" y="55" width="110" height="4" rx="1" />
    <rect x="15" y="20" width="7" height="32" fill="#D51F26" />
    <rect x="31" y="20" width="7" height="32" fill="#D51F26" />
    <rect x="47" y="20" width="7" height="32" fill="#ffffff" />
    <rect x="63" y="20" width="7" height="32" fill="#ffffff" />
    <rect x="79" y="20" width="7" height="32" fill="#FFCC00" />
    <rect x="95" y="20" width="7" height="32" fill="#FFCC00" />
    <rect x="10" y="14" width="100" height="6" />
  </g>
</svg>
